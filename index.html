<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>いぶヌカヅキ | Profile</title>

<style>
:root{
  --gold:#d7b46a;
  --gold2:#f5df9b;
  --cream:#fff7e8;
  --dark:#080604;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  color:var(--cream);
  background:var(--dark);
  font-family:"Times New Roman","Noto Serif JP","Noto Serif SC",serif;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition:background-image 1s ease-in-out;
}

.shade{
  position:fixed;
  inset:0;
  z-index:-2;
  background:linear-gradient(
    90deg,
    rgba(0,0,0,.62),
    rgba(0,0,0,.84) 34%,
    rgba(0,0,0,.86) 66%,
    rgba(0,0,0,.62)
  );
}

.sparkle{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    radial-gradient(circle at 72% 15%, rgba(245,210,120,.25), transparent 8%),
    radial-gradient(circle at 85% 30%, rgba(245,210,120,.18), transparent 7%),
    radial-gradient(circle at 78% 72%, rgba(245,210,120,.18), transparent 9%);
}

.page{
  width:min(760px,92vw);
  margin:0 auto;
  min-height:100vh;
  padding:42px 0 34px;
}

.lang-label{
  text-align:center;
  color:var(--gold2);
  letter-spacing:.22em;
  font-size:.82rem;
  margin-bottom:16px;
}

.langs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:58px;
}

.langs button{
  background:rgba(0,0,0,.34);
  border:1px solid rgba(245,223,155,.58);
  color:var(--cream);
  padding:16px 10px;
  font-size:1rem;
  letter-spacing:.12em;
  cursor:pointer;
  font-family:inherit;
}

.langs button.active,
.langs button:hover{
  background:rgba(132,12,13,.78);
  box-shadow:0 0 18px rgba(245,210,120,.18);
}

.name{
  text-align:center;
  font-size:3.2rem;
  line-height:1.1;
  color:var(--gold2);
  text-shadow:0 0 18px rgba(245,210,120,.45);
  margin-bottom:20px;
}

.line{
  display:flex;
  align-items:center;
  gap:16px;
  margin:0 auto 26px;
  color:var(--gold);
}

.line::before,
.line::after{
  content:"";
  height:1px;
  flex:1;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.intro{
  text-align:center;
  line-height:2;
  margin-bottom:34px;
  font-size:1.05rem;
}

.profile-text{
  line-height:2;
  margin:0 auto 42px;
  padding:22px 24px;
  background:rgba(0,0,0,.38);
  border:1px solid rgba(245,223,155,.35);
  font-size:1rem;
}

.section-title{
  display:flex;
  align-items:center;
  gap:16px;
  color:var(--gold2);
  letter-spacing:.22em;
  justify-content:center;
  margin-bottom:18px;
}

.section-title::before,
.section-title::after{
  content:"";
  height:1px;
  width:150px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.links{
  display:grid;
  gap:12px;
}

.link-card{
  display:grid;
  grid-template-columns:42px 1fr 22px;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  background:rgba(0,0,0,.42);
  border:1px solid rgba(245,223,155,.45);
  color:var(--cream);
  text-decoration:none;
  position:relative;
  z-index:10;
  cursor:pointer;
  -webkit-tap-highlight-color:rgba(245,223,155,.25);
  touch-action:manipulation;
}

.link-card:hover{
  background:rgba(110,20,14,.42);
}

.icon{
  font-size:1.65rem;
}

.link-title{
  font-size:1rem;
  margin-bottom:4px;
}

.link-url{
  font-size:.82rem;
  opacity:.82;
  word-break:break-all;
}

.arrow{
  color:var(--gold2);
  font-size:1.4rem;
}

.credit{
  margin-top:58px;
  padding-top:26px;
  border-top:1px solid rgba(245,223,155,.28);
  text-align:center;
  line-height:2;
  font-size:.92rem;
}

.credit-title{
  color:var(--gold2);
  letter-spacing:.22em;
  margin-bottom:12px;
}

.note{
  margin-top:10px;
  opacity:.82;
  font-size:.86rem;
}

@media(max-width:760px){
  .shade{ background:rgba(0,0,0,.72); }
  .page{ padding-top:28px; }
  .langs{ grid-template-columns:1fr; margin-bottom:42px; }
  .name{ font-size:2.35rem; }
  .section-title::before,
  .section-title::after{ width:70px; }
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="shade"></div>
<div class="sparkle"></div>

<main class="page">

  <div class="lang-label" id="langLabel">→ SELECT LANGUAGE ←</div>

  <div class="langs">
    <button id="btn-jp" onclick="setLang('jp')">日本語</button>
    <button id="btn-en" onclick="setLang('en')">ENGLISH</button>
    <button id="btn-cn" onclick="setLang('cn')">中文</button>
  </div>

  <h1 class="name" id="name"></h1>
  <div class="line">✦</div>

  <div class="intro" id="intro"></div>
  <div class="profile-text" id="profileText"></div>

  <div class="section-title" id="linksTitle">LINKS</div>
  <div class="links" id="links"></div>

  <section class="credit">
    <div class="credit-title" id="creditTitle"></div>
    <div id="creditText"></div>
    <div class="note" id="noteText"></div>
  </section>

</main>

<script>

    profileText:`

    creditText:`

    links:[
      ["🔞","🔞用アカウント","https://x.com/iburigakosample?s=21"],
      ["👤","メインアカウント","https://x.com/t86zj5v6?s=21"],

    name:"Ibu Nukazuki",
    intro:"OP / Fan works / Novels / Creative account.<br>Japanese, English, and Chinese are OK ✨<br>Currently practicing illustration.",
    profileText:`
      My name is Ibu Nukazuki.<br>

    linksTitle:"LINKS",

    creditText:`

      ["✨","✨ Bottom Account","https://x.com/ibunukazukibruk?s=21"],

    profileText:`

    linksTitle:"LINKS",

      ["📖","小说存放处（privatter）","https://privatter.me/user/T86zJ5v6"],
      ["💬","匿名提问箱（mond）","https://mond.how/ja/ibunukazukibruk"],
      ["💌","匿名提问箱（Marshmallow）","https://marshmallow-qa.com/fyp9jx8wjpxcq6l"]
    ]
  }
};

function setLang(lang){
  const d = data[lang];

  document.documentElement.lang = d.htmlLang;
  document.getElementById("langLabel").innerHTML = d.langLabel;
  document.getElementById("name").innerHTML = d.name;
  document.getElementById("intro").innerHTML = d.intro;
  document.getElementById("profileText").innerHTML = d.profileText;
  document.getElementById("linksTitle").innerHTML = d.linksTitle;
  document.getElementById("creditTitle").innerHTML = d.creditTitle;
  document.getElementById("creditText").innerHTML = d.creditText;
  document.getElementById("noteText").innerHTML = d.noteText;

  document.getElementById("links").innerHTML = d.links.map(item => `
    <a
      class="link-card"
      href="${item[2]}"
      target="_blank"
      rel="noopener noreferrer"
      onclick="window.open('${item[2]}','_blank'); return false;"
    >
      <div class="icon">${item[0]}</div>
      <div>
        <div class="link-title">${item[1]}</div>
        <div class="link-url">${item[2]}</div>
      </div>
      <div class="arrow">›</div>
    </a>
  `).join("");

  ["jp","en","cn"].forEach(x=>{
    document.getElementById("btn-"+x).classList.toggle("active", x===lang);
  });
}

setLang("jp");

const images = [
  "IMG_0999.jpeg",
  "IMG_1001.jpeg",
  "IMG_1184.jpeg"
];

const bg = document.getElementById("bg");

let current = Math.floor(Math.random() * images.length);

function setBackground(index){
  bg.style.backgroundImage = `url("${images[index]}")`;
}

setBackground(current);

function changeBg(){
  let next;
  do{
    next = Math.floor(Math.random() * images.length);
  }while(next === current);

  current = next;
  setBackground(current);
}

setInterval(changeBg, 7000);
</script>

</body>
</html>
